<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=340, initial-scale=1.0">
<style>
  :root {
    --bg: rgba(255,255,255,0.01);
    --panel-bg: rgba(255,255,255,0.72);
    --text: #1d1d1f;
    --text-secondary: #86868b;
    --ring-track: rgba(0,0,0,0.08);
    --btn-idle: rgba(0,0,0,0.06);
    --btn-hover: rgba(0,0,0,0.1);
    --border: rgba(0,0,0,0.08);
    --focus: #ff6b6b;
    --focus-hover: #ff8787;
    --short-break: #34c759;
    --short-break-hover: #4cd964;
    --long-break: #007aff;
    --long-break-hover: #3399ff;
    --radius: 18px;
    --font: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: transparent;
    color: var(--text);
    display: flex; justify-content: center; align-items: flex-start;
    height: 100vh; padding: 10px;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none; -webkit-user-select: none;
  }

  .app {
    width: 316px; height: 100%;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px;
  }

  .glass {
    background: var(--panel-bg);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: var(--radius);
    box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }

  /* ---------- Ring + Timer ---------- */
  .ring-wrap { width: 100%; padding: 16px 0 10px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .ring-container { position: relative; width: 190px; height: 190px; }
  .ring-svg { width: 190px; height: 190px; transform: rotate(-90deg); }

  .timer-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .timer-time { font-size: 42px; font-weight: 700; letter-spacing: -1px; color: var(--text); }
  .timer-mode { font-size: 12px; font-weight: 500; margin-top: 1px; }

  /* ---------- Task List ---------- */
  .tasks-wrap { width: 100%; padding: 10px 14px; flex-shrink: 0; }
  .tasks-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
    font-size: 11px; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .task-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 0; border-bottom: 1px solid var(--border);
  }
  .task-item:last-of-type { border-bottom: none; }
  .task-check {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid #d1d1d6; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-size: 9px; color: transparent;
  }
  .task-check.done { background: var(--short-break); border-color: var(--short-break); color: #fff; }
  .task-text { flex: 1; font-size: 12px; cursor: pointer; }
  .task-text.done { text-decoration: line-through; color: var(--text-secondary); }
  .task-del { cursor: pointer; color: var(--text-secondary); font-size: 13px; opacity: 0; transition: opacity 0.15s; }
  .task-item:hover .task-del { opacity: 1; }
  .task-add {
    display: flex; gap: 4px; margin-top: 6px;
  }
  .task-input {
    flex: 1; border: none; background: rgba(0,0,0,0.04); border-radius: 8px;
    padding: 5px 10px; font-size: 11px; font-family: var(--font); outline: none;
  }
  .task-add-btn {
    border: none; background: var(--btn-idle); border-radius: 8px;
    padding: 5px 12px; font-size: 11px; cursor: pointer; font-family: var(--font);
    transition: background 0.15s;
  }
  .task-add-btn:hover { background: var(--btn-hover); }

  /* ---------- Stats ---------- */
  .stats-wrap { width: 100%; padding: 8px 14px; flex-shrink: 0; }
  .stats-row { display: flex; justify-content: space-around; text-align: center; }
  .stat-num { font-size: 18px; font-weight: 700; }
  .stat-label { font-size: 10px; color: var(--text-secondary); }
  .chart-row { display: flex; justify-content: space-between; align-items: flex-end; gap: 3px; margin-top: 4px; height: 36px; }
  .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .chart-bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s; }
  .chart-label { font-size: 9px; color: var(--text-secondary); }

  /* ---------- Controls ---------- */
  .controls-wrap { width: 100%; padding: 6px 14px; display: flex; justify-content: center; gap: 8px; flex-shrink: 0; }
  .btn {
    border: none; border-radius: 18px; padding: 8px 20px; font-size: 12px;
    font-weight: 600; font-family: var(--font); cursor: pointer; transition: all 0.15s;
    -webkit-app-region: no-drag;
  }
  .btn-start { background: var(--focus); color: #fff; width: 90px; }
  .btn-start:hover { background: var(--focus-hover); }
  .btn-pause { background: var(--btn-idle); color: var(--text); width: 70px; }
  .btn-pause:hover { background: var(--btn-hover); }
  .btn-pause.active { background: #1d1d1f; color: #fff; }
  .btn-reset { background: var(--btn-idle); color: var(--text); width: 70px; }
  .btn-reset:hover { background: var(--btn-hover); }

  /* ---------- Bottom Bar ---------- */
  .bottom-wrap { width: 100%; padding: 2px 14px 6px; display: flex; justify-content: center; gap: 14px; flex-shrink: 0; }
  .icon-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: none; background: var(--btn-idle); cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; -webkit-app-region: no-drag;
  }
  .icon-btn:hover { background: var(--btn-hover); }

  /* ---------- Settings Modal ---------- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; -webkit-app-region: no-drag;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border-radius: 20px; padding: 24px; width: 280px;
    border: 1px solid rgba(255,255,255,0.5);
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal h3 { font-size: 16px; margin-bottom: 16px; text-align: center; }
  .modal label { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 12px; }
  .modal input[type="range"] { width: 100px; accent-color: var(--focus); }
  .modal .val { font-weight: 600; min-width: 40px; text-align: right; }
  .modal .btn-save {
    width: 100%; margin-top: 12px; border: none; border-radius: 14px;
    padding: 10px; font-size: 14px; font-weight: 600; font-family: var(--font);
    background: var(--focus); color: #fff; cursor: pointer; transition: background 0.15s;
  }
  .modal .btn-save:hover { background: var(--focus-hover); }
</style>
</head>
<body>
<div class="app">

  <!-- Timer Ring -->
  <div class="ring-wrap glass">
    <div class="ring-container">
      <svg class="ring-svg" viewBox="0 0 190 190">
        <circle cx="95" cy="95" r="82" fill="none"
                stroke="rgba(0,0,0,0.08)" stroke-width="8" id="ring-track"/>
        <circle cx="95" cy="95" r="82" fill="none"
                stroke="#ff6b6b" stroke-width="8" stroke-linecap="round"
                stroke-dasharray="515.22" stroke-dashoffset="0" id="ring-fg"/>
      </svg>
      <div class="timer-text">
        <div class="timer-time" id="time">25:00</div>
        <div class="timer-mode" id="mode-label">专注</div>
      </div>
    </div>
  </div>

  <!-- Task List -->
  <div class="tasks-wrap glass" id="tasks-wrap">
    <div class="tasks-header">
      <span>今日任务</span>
      <span id="active-task-label"></span>
    </div>
    <div id="task-list"></div>
    <div class="task-add">
      <input class="task-input" id="task-input" placeholder="添加新任务..." maxlength="60">
      <button class="task-add-btn" id="task-add-btn">添加</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-wrap glass">
    <div class="stats-row">
      <div><div class="stat-num" id="stat-today">0</div><div class="stat-label">今日</div></div>
      <div><div class="stat-num" id="stat-week">0</div><div class="stat-label">本周</div></div>
      <div><div class="stat-num" id="stat-total">0</div><div class="stat-label">总计</div></div>
    </div>
    <div class="chart-row" id="chart-row"></div>
  </div>

  <!-- Controls -->
  <div class="controls-wrap">
    <button class="btn btn-start" id="btn-start">开始</button>
    <button class="btn btn-pause" id="btn-pause">暂停</button>
    <button class="btn btn-reset" id="btn-reset">重置</button>
  </div>

  <!-- Bottom -->
  <div class="bottom-wrap">
    <button class="icon-btn" id="btn-settings" title="设置">&#x2699;</button>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <h3>自定义时长</h3>
      <label>专注时长 <input type="range" id="set-focus" min="5" max="60" value="25"><span class="val" id="val-focus">25分钟</span></label>
      <label>短休息 <input type="range" id="set-short" min="1" max="15" value="5"><span class="val" id="val-short">5分钟</span></label>
      <label>长休息 <input type="range" id="set-long" min="5" max="30" value="15"><span class="val" id="val-long">15分钟</span></label>
      <button class="btn-save" id="btn-save-settings">保存</button>
    </div>
  </div>

</div>

<script>
// ── State ──
const RING_CIRCUM = 2 * Math.PI * 82; // ~628.32
const MODES = {
  focus:    { name: '专注', color: '#ff6b6b', hover: '#ff8787' },
  short_break: { name: '小憩', color: '#34c759', hover: '#4cd964' },
  long_break:  { name: '长休息', color: '#007aff', hover: '#3399ff' },
};
const LONG_BREAK_INTERVAL = 4;

let mode = 'focus';
let state = 'idle'; // idle | running | paused
let remaining = 25 * 60;
let totalDuration = 25 * 60;
let segmentBase = 25 * 60;
let focusCount = 0;
let tickTimer = null;
let startTimestamp = null;
let pausedRemaining = 0;

function localDate(d) {
  d = d || new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── Persistence (Python file backend) ──
let _cachedData = {};

async function _loadFromBackend() {
  try { _cachedData = await window.pywebview.api.load_data(); } catch(e) { _cachedData = {}; }
}
function loadData() { return _cachedData; }
function saveData(data) {
  _cachedData = data;
  try { window.pywebview.api.save_data(data); } catch(e) {}
}

function getSettings() {
  const saved = loadData().settings || {};
  return { focus: saved.focus || 25, shortBreak: saved.shortBreak || 5, longBreak: saved.longBreak || 15 };
}

function loadTasks() {
  const today = localDate();
  return (loadData().tasks || []).filter(t => t.date === today);
}
function saveTasks(tasks) {
  const data = loadData();
  const today = localDate();
  const other = (data.tasks || []).filter(t => t.date !== today);
  data.tasks = [...other, ...tasks];
  saveData(data);
}

function loadHistory() { return loadData().history || []; }
function saveHistory(history) {
  const data = loadData();
  data.history = history;
  saveData(data);
}

function getModeMinutes(m) {
  const s = getSettings();
  if (m === 'focus') return s.focus;
  if (m === 'short_break') return s.shortBreak;
  return s.longBreak;
}

// ── Timer logic ──
function setRemainingForMode(m) {
  totalDuration = getModeMinutes(m) * 60;
  remaining = totalDuration;
  segmentBase = totalDuration;
}

function startTimer() {
  if (state === 'idle') {
    state = 'running';
    setRemainingForMode(mode);
    startTimestamp = Date.now();
    tickTimer = setInterval(tick, 200);
    updateUI();
  } else if (state === 'paused') {
    state = 'running';
    remaining = pausedRemaining;
    segmentBase = pausedRemaining;
    pausedRemaining = 0;
    startTimestamp = Date.now();
    tickTimer = setInterval(tick, 200);
    updateUI();
  }
}

function pauseTimer() {
  if (state === 'running') {
    state = 'paused';
    clearInterval(tickTimer);
    tickTimer = null;
    pausedRemaining = remaining;
    updateUI();
  }
}

function resetTimer() {
  state = 'idle';
  clearInterval(tickTimer);
  tickTimer = null;
  pausedRemaining = 0;
  setRemainingForMode(mode);
  updateUI();
}

function skipBreak() {
  if (mode === 'short_break' || mode === 'long_break') {
    clearInterval(tickTimer);
    tickTimer = null;
    state = 'idle';
    pausedRemaining = 0;
    mode = 'focus';
    setRemainingForMode(mode);
    updateUI();
  }
}

function tick() {
  if (state !== 'running') return;
  const now = Date.now();
  const elapsed = Math.floor((now - startTimestamp) / 1000);
  remaining = Math.max(0, segmentBase - elapsed);
  updateUI();
  if (remaining <= 0) {
    clearInterval(tickTimer);
    tickTimer = null;
    onTimerEnd();
  }
}

function onTimerEnd() {
  state = 'idle';
  if (mode === 'focus') {
    focusCount++;
    const today = localDate();
    const history = loadHistory();
    const entry = history.find(h => h.date === today);
    if (entry) entry.count++;
    else history.push({ date: today, count: 1 });
    saveHistory(history);
    mode = (focusCount % LONG_BREAK_INTERVAL === 0) ? 'long_break' : 'short_break';
  } else {
    mode = 'focus';
  }
  setRemainingForMode(mode);
  notifyEnd();
  updateUI();
}

function notifyEnd() {
  try { window.pywebview.api.notify(); } catch(e) {}
}

// ── UI Update ──
function updateUI() {
  // Timer
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  document.getElementById('time').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  const cfg = MODES[mode];
  document.getElementById('mode-label').textContent = cfg.name;
  document.getElementById('mode-label').style.color = cfg.color;

  // Ring
  const fraction = totalDuration > 0 ? (totalDuration - remaining) / totalDuration : 0;
  const offset = RING_CIRCUM * (1 - fraction);
  document.getElementById('ring-fg').setAttribute('stroke-dashoffset', offset);
  document.getElementById('ring-fg').setAttribute('stroke', cfg.color);

  // Buttons
  const btnStart = document.getElementById('btn-start');
  const btnPause = document.getElementById('btn-pause');
  if (state === 'running') {
    btnStart.textContent = '开始';
    btnStart.style.background = 'rgba(0,0,0,0.06)';
    btnStart.style.color = '#1d1d1f';
    btnPause.classList.add('active');
  } else if (state === 'paused') {
    btnStart.textContent = '继续';
    btnStart.style.background = cfg.color;
    btnStart.style.color = '#fff';
    btnPause.classList.remove('active');
  } else {
    btnStart.textContent = '开始';
    btnStart.style.background = cfg.color;
    btnStart.style.color = '#fff';
    btnPause.classList.remove('active');
  }

  // Task list
  renderTaskList();

  // Stats
  updateStats();

  // Title
  document.title = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} - ${cfg.name}`;
}

// ── Tasks ──
let tasks = [];

function renderTaskList() {
  const container = document.getElementById('task-list');
  const activeLabel = document.getElementById('active-task-label');
  container.innerHTML = '';

  if (tasks.length === 0) {
    container.innerHTML = '<div style="font-size:12px;color:#86868b;text-align:center;padding:8px 0;">暂无任务</div>';
    activeLabel.textContent = '';
  }

  tasks.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'task-item';

    const check = document.createElement('span');
    check.className = 'task-check' + (t.done ? ' done' : '');
    check.textContent = t.done ? '✓' : '';
    check.onclick = () => { tasks[i].done = !tasks[i].done; saveTasks(tasks); renderTaskList(); };

    const text = document.createElement('span');
    text.className = 'task-text' + (t.done ? ' done' : '');
    text.textContent = t.text;

    const del = document.createElement('span');
    del.className = 'task-del';
    del.textContent = '×';
    del.onclick = () => { tasks.splice(i, 1); saveTasks(tasks); renderTaskList(); };

    div.appendChild(check);
    div.appendChild(text);
    div.appendChild(del);
    container.appendChild(div);
  });

  const incomplete = tasks.filter(t => !t.done).length;
  if (incomplete > 0) activeLabel.textContent = `${incomplete} 项待完成`;
  else if (tasks.length > 0) activeLabel.textContent = '全部完成 ✓';
}

document.getElementById('task-add-btn').addEventListener('click', () => {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) return;
  tasks.push({ id: Date.now(), text, done: false, date: localDate() });
  saveTasks(tasks);
  input.value = '';
  renderTaskList();
});

document.getElementById('task-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('task-add-btn').click();
});

// ── Stats ──
function updateStats() {
  const history = loadHistory();
  const today = localDate();

  const todayCount = (history.find(h => h.date === today) || {}).count || 0;
  document.getElementById('stat-today').textContent = todayCount;

  const weekStart = new Date();
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  weekStart.setHours(0,0,0,0);
  const weekStartStr = localDate(weekStart);
  const weekCount = history.filter(h => h.date >= weekStartStr).reduce((s, h) => s + h.count, 0);
  document.getElementById('stat-week').textContent = weekCount;

  const totalCount = history.reduce((s, h) => s + h.count, 0);
  document.getElementById('stat-total').textContent = totalCount;

  // Weekly chart
  const chartRow = document.getElementById('chart-row');
  chartRow.innerHTML = '';
  const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
  const maxCount = Math.max(1, ...history.filter(h => h.date >= weekStartStr).map(h => h.count));

  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    const ds = localDate(d);
    const count = (history.find(h => h.date === ds) || {}).count || 0;
    const isToday = ds === today;
    const h = Math.max(3, (count / maxCount) * 28);

    const wrap = document.createElement('div');
    wrap.className = 'chart-bar-wrap';

    const bar = document.createElement('div');
    bar.className = 'chart-bar';
    bar.style.height = h + 'px';
    bar.style.background = isToday ? '#ff6b6b' : 'rgba(0,0,0,0.15)';
    bar.title = `${count} 个番茄`;

    const label = document.createElement('span');
    label.className = 'chart-label';
    label.textContent = dayNames[i];
    if (isToday) label.style.color = '#ff6b6b';

    wrap.appendChild(bar);
    wrap.appendChild(label);
    chartRow.appendChild(wrap);
  }
}

// ── Settings Modal ──
const modal = document.getElementById('modal-overlay');
document.getElementById('btn-settings').addEventListener('click', () => {
  const s = getSettings();
  document.getElementById('set-focus').value = s.focus;
  document.getElementById('set-short').value = s.shortBreak;
  document.getElementById('set-long').value = s.longBreak;
  updateModalLabels();
  modal.classList.remove('hidden');
});

modal.addEventListener('click', (e) => {
  if (e.target === modal) modal.classList.add('hidden');
});

function updateModalLabels() {
  document.getElementById('val-focus').textContent = document.getElementById('set-focus').value + '分钟';
  document.getElementById('val-short').textContent = document.getElementById('set-short').value + '分钟';
  document.getElementById('val-long').textContent = document.getElementById('set-long').value + '分钟';
}

['set-focus','set-short','set-long'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateModalLabels);
});

document.getElementById('btn-save-settings').addEventListener('click', () => {
  const data = loadData();
  data.settings = {
    focus: parseInt(document.getElementById('set-focus').value),
    shortBreak: parseInt(document.getElementById('set-short').value),
    longBreak: parseInt(document.getElementById('set-long').value),
  };
  saveData(data);
  setRemainingForMode(mode);
  modal.classList.add('hidden');
  updateUI();
});

// ── Init ──
document.getElementById('btn-start').addEventListener('click', startTimer);
document.getElementById('btn-pause').addEventListener('click', pauseTimer);
document.getElementById('btn-reset').addEventListener('click', resetTimer);

(async function init() {
  await _loadFromBackend();
  tasks = loadTasks();
  setRemainingForMode('focus');
  updateUI();
})();
</script>
</body>
</html>
